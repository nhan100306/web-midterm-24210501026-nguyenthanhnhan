<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Ký Đại Biểu | BDU</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
            .register-wrapper {
                min-height: calc(100vh - 70px); /* Tự động tính chiều cao full màn hình trừ đi navbar */
                display: flex;                  /* Kích hoạt chế độ Flexbox */
                align-items: center;            /* Căn giữa form theo chiều dọc */
                justify-content: center;        /* Căn giữa form theo chiều ngang */
                padding: 40px 15px;             /* Tạo khoảng cách đệm khi xem trên điện thoại */
                background-color: #f8fafc;      /* Màu nền dịu mắt của trang */
            }

            .custom-form-card {
                background-color: #fff;
                border: 1px solid #e2e8f0;
                border-radius: 8px;
                padding: 30px;
                width: 100%;                   /* Đảm bảo form co giãn tốt */
                max-width: 600px;              /* Giới hạn độ rộng tối đa của form giống như ảnh mẫu */
            }

            .form-label {
                font-size: 14px;
                color: #1a202c;
            }

            .btn-submit-custom {
                background-color: #3b82f6; 
                border: none;
                border-radius: 4px;
                padding: 12px;
                transition: background-color 0.2s;
            }

            .btn-submit-custom:hover {
                background-color: #2563eb;
            }
    </style>
</head>
<body style="background-color: #f8fafc;">
    <nav class="navbar navbar-expand-lg navbar-dark bg-custom-navy sticky-top shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="index.html">BDU EVENT</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="index.html">Trang chủ</a></li>
                    <li class="nav-item"><a class="nav-link" href="courses.html">Chương trình</a></li>
                    <li class="nav-item"><a class="nav-link active" href="register.html">Đăng ký</a></li>
                    <li class="nav-item"><a class="nav-link" href="registrations.html">Quản lý</a></li>
                </ul>
            </div>
        </div>
    </nav>
    <div class="register-wrapper">
            <div class="custom-form-card shadow-sm">
                <h3 class="text-center fw-bold mb-2" style="color: #2563eb;">Phiếu Đăng Ký </h3>
                <p class="text-center text-muted mb-4">Hội thảo Khoa học, Công nghệ & ĐMST 2026</p>
                
                <form id="register-form">
                        <div class="mb-3">
                            <label class="form-label fw-bold">Họ và Tên *</label>
                            <input type="text" id="fullname" class="form-control" placeholder="Nhập họ và tên...">
                            <div id="name-error" class="error-text"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Email *</label>
                            <input type="email" id="email" class="form-control" placeholder="name@domain.com">
                            <div id="email-error" class="error-text"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Số điện thoại *</label>
                            <input type="text" id="phone" class="form-control" placeholder="09xx xxx xxx">
                            <div id="phone-error" class="error-text"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Lớp / Đơn vị công tác *</label>
                            <input type="text" id="studentClass" class="form-control" placeholder="Ví dụ: 22IT1">
                            <div id="class-error" class="error-text"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Chương trình / Khóa học muốn tham gia *</label>
                            <select id="event" class="form-select">
                                <option value="">-- Chọn chương trình --</option>
                                <option value="Hội thảo Công nghệ & ĐMST 2026 (Ngày 12/06)">
                                    [SỰ KIỆN] Hội thảo Khoa học, Công nghệ & ĐMST 2026 
                                </option>
                                
                                </select>
                            <div id="event-error" class="error-text"></div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold">Câu hỏi dành cho diễn giả (Tùy chọn)</label>
                            <textarea id="note" class="form-control" rows="3" placeholder="Nhập câu hỏi của bạn..."></textarea>
                        </div>

                        <button type="submit" class="btn w-100 fw-bold text-white btn-submit-custom">XÁC NHẬN ĐĂNG KÝ</button>
                    </form>
                </div>
            </div>
            <footer class="bg-custom-navy text-white text-center py-4">
        <p class="mb-0">© 2026 BDU Ca Mau. Designed by Nhàn.</p>
    </footer>


    <script src="assets/js/data.js"></script>
    <script src="assets/js/main.js"></script>
</body>
</html>
